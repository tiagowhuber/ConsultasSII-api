name: Database Backup

on:
  schedule:
    # Every Sunday at 02:00 UTC
    - cron: '0 2 * * 0'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL 17 client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gnupg curl lsb-release
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17

      - name: Dump database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: /usr/lib/postgresql/17/bin/pg_dump "$DATABASE_URL" -Fc -f /tmp/dump.pgdump

      - name: Import GPG public key
        env:
          GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
        run: echo "$GPG_PUBLIC_KEY" | gpg --batch --import

      - name: Encrypt dump
        env:
          GPG_FINGERPRINT: ${{ secrets.GPG_FINGERPRINT }}
        run: |
          gpg --batch --yes \
              --trust-model always \
              --recipient "$GPG_FINGERPRINT" \
              --encrypt /tmp/dump.pgdump
          # Output is /tmp/dump.pgdump.gpg

      - name: Move encrypted dump into repo
        run: |
          mkdir -p database/backups
          mv /tmp/dump.pgdump.gpg database/backups/latest.pgdump.gpg

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add database/backups/latest.pgdump.gpg
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: weekly database backup $(date -u '+%Y-%m-%d')"
          git push
